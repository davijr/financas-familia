<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cartão Virtual 💌</title>
  <meta name="robots" content="noindex" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💌</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #f8eedd;
      --gold:    #c99b3f;
      --gold-l:  #e6bf72;
      --dark:    #0a0705;
      --ease:    cubic-bezier(0.42, 0, 0.18, 1);
      --font-s:  'Playfair Display', Georgia, serif;
      --font-b:  'Josefin Sans', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ═══════════════════════
       TOP PROGRESS BAR
    ═══════════════════════ */
    #topBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      gap: 3px;
      padding: env(safe-area-inset-top, 0) 10px 0;
      height: calc(8px + env(safe-area-inset-top, 0));
      align-items: flex-end;
      padding-bottom: 4px;
    }

    .bar-segment {
      flex: 1;
      height: 2px;
      background: rgba(255,255,255,0.22);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-segment .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--gold-l));
      border-radius: 2px;
    }

    .bar-segment.done .bar-fill  { width: 100%; transition: none; }
    .bar-segment.active .bar-fill {
      width: 100%;
      transition: width 8s linear;
    }

    /* ═══════════════════════
       SLIDESHOW
    ═══════════════════════ */
    #slideshow {
      position: fixed;
      inset: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s var(--ease);
    }

    .slide.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Video background (slide 1) ── */
    .slide__video {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .slide__video video {
      position: absolute;
      top: 50%; left: 50%;
      min-width: 100%; min-height: 100%;
      width: auto; height: auto;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    /* ── Photo layer(s) ── */
    .slide__photo {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      will-change: transform;
    }

    /* Ken Burns variants */
    .kb-zoom-in   { animation: kbZoomIn   9s ease forwards; }
    .kb-zoom-out  { animation: kbZoomOut  9s ease forwards; }
    .kb-pan-right { animation: kbPanR     9s ease forwards; }
    .kb-pan-left  { animation: kbPanL     9s ease forwards; }
    .kb-diagonal  { animation: kbDiag     9s ease forwards; }

    @keyframes kbZoomIn   { from{transform:scale(1.08)translate(0,0)}  to{transform:scale(1)translate(0,0)} }
    @keyframes kbZoomOut  { from{transform:scale(1)translate(0,0)}     to{transform:scale(1.07)translate(0,0)} }
    @keyframes kbPanR     { from{transform:scale(1.06)translate(-2%,0)}to{transform:scale(1.02)translate(2%,0)} }
    @keyframes kbPanL     { from{transform:scale(1.06)translate(2%,0)} to{transform:scale(1.02)translate(-2%,0)} }
    @keyframes kbDiag     { from{transform:scale(1.07)translate(-1%,1%)}to{transform:scale(1.01)translate(1%,-1%)} }

    /* ── Second photo crossfade ── */
    .slide__photo-b {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      animation: crossfadeIn 2.5s ease 4.5s forwards;
    }

    @keyframes crossfadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Color grade ── */
    .slide__grade {
      position: absolute;
      inset: 0;
      mix-blend-mode: multiply;
      opacity: 0.4;
      pointer-events: none;
    }

    /* ── Vignette ── */
    .slide__vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 90% 75% at 50% 38%, transparent 20%, rgba(4,2,0,0.65) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.18) 0%, transparent 25%, transparent 48%, rgba(0,0,0,0.80) 100%);
    }

    /* ── Bokeh ── */
    .bokeh {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bokeh__dot {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(230,191,114,0.55) 0%, transparent 65%);
      filter: blur(3px);
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform:translateY(0) scale(1);    opacity:0; }
      8%   { opacity:0.7; }
      85%  { opacity:0.45; }
      100% { transform:translateY(-108vh) scale(1.4); opacity:0; }
    }

    /* ═══════════════════════
       STORY PANEL (bottom)
    ═══════════════════════ */
    .slide__story {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 2.5rem 1.75rem;
      padding-bottom: max(2rem, env(safe-area-inset-bottom, 2rem));
      background: linear-gradient(to top,
        rgba(5,2,0,0.9)  0%,
        rgba(5,2,0,0.75) 38%,
        rgba(5,2,0,0.28) 72%,
        transparent      100%
      );
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    /* Left accent line */
    .slide__story::before {
      content: '';
      position: absolute;
      left: 0; top: 32%; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, transparent, rgba(201,155,63,0.55), transparent);
    }

    .slide__eyebrow {
      font-family: var(--font-b);
      font-size: 0.57rem;
      font-weight: 200;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(201,155,63,0.82);
    }

    .slide__title {
      font-family: var(--font-s);
      font-size: clamp(1.85rem, 7.5vw, 2.75rem);
      font-weight: 700;
      font-style: italic;
      line-height: 1.1;
      color: var(--cream);
      text-shadow: 0 2px 24px rgba(0,0,0,0.55);
    }

    .slide__rule {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .slide__rule-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.65;
      flex-shrink: 0;
    }

    .slide__rule-line {
      height: 1px;
      width: 2rem;
      background: linear-gradient(90deg, rgba(201,155,63,0.6), transparent);
    }

    .slide__phrase {
      font-family: var(--font-s);
      font-size: clamp(0.88rem, 3.7vw, 1.03rem);
      font-weight: 400;
      line-height: 1.72;
      color: rgba(248,238,221,0.78);
      text-shadow: 0 1px 12px rgba(0,0,0,0.6);
      max-width: 38ch;
    }

    .slide__nav {
      display: flex;
      gap: 0.7rem;
      align-items: center;
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    .btn {
      cursor: pointer;
      border: none;
      outline: none;
      font-family: var(--font-b);
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.9rem 1.75rem;
      transition: all 0.25s ease;
      -webkit-tap-highlight-color: transparent;
      min-height: 44px;
    }

    .btn-next {
      background: var(--gold);
      color: var(--dark);
      flex: 1;
      max-width: 200px;
      position: relative;
      overflow: hidden;
    }

    .btn-next::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      transition: left 0.5s ease;
    }

    .btn-next:active { transform: scale(0.97); }
    .btn-next:active::after,
    .btn-next:hover::after  { left: 160%; }

    .btn-back {
      background: rgba(255,255,255,0.07);
      color: rgba(248,238,221,0.55);
      border: 1px solid rgba(255,255,255,0.13);
      min-width: 80px;
    }

    .btn-back:active { opacity: 0.7; transform: scale(0.97); }

    /* ═══════════════════════
       SLIDE BADGE (top-right)
    ═══════════════════════ */
    #slideBadge {
      position: fixed;
      top: max(0.9rem, calc(env(safe-area-inset-top, 0) + 0.5rem));
      right: 1rem;
      font-family: var(--font-b);
      font-size: 0.57rem;
      font-weight: 200;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.5);
      z-index: 201;
    }

    /* ═══════════════════════
       MUSIC BUTTON
    ═══════════════════════ */
    #musicBtn {
      position: fixed;
      bottom: max(1rem, env(safe-area-inset-bottom, 1rem));
      right: 1rem;
      z-index: 100;
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.38);
      border: 1px solid rgba(201,155,63,0.32);
      backdrop-filter: blur(8px);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      outline: none;
    }

    #musicBtn.visible { opacity: 1; pointer-events: all; }

    .music-bars {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 11px;
    }

    .music-bars span {
      display: block;
      width: 2px;
      border-radius: 1px;
      background: var(--gold);
      transform-origin: bottom;
    }

    #musicBtn.playing .music-bars span {
      animation: mBar 0.75s ease-in-out infinite alternate;
    }

    #musicBtn.playing .music-bars span:nth-child(1) { height:4px;  animation-delay:0s;    }
    #musicBtn.playing .music-bars span:nth-child(2) { height:10px; animation-delay:0.2s;  }
    #musicBtn.playing .music-bars span:nth-child(3) { height:6px;  animation-delay:0.35s; }
    #musicBtn.playing .music-bars span:nth-child(4) { height:11px; animation-delay:0.1s;  }

    #musicBtn:not(.playing) .music-bars span { height:4px !important; opacity:0.35; }

    @keyframes mBar {
      from { transform: scaleY(0.2); }
      to   { transform: scaleY(1); }
    }

    /* ═══════════════════════
       REVEAL ANIMATIONS
    ═══════════════════════ */
    .slide__eyebrow,
    .slide__title,
    .slide__rule,
    .slide__phrase,
    .slide__nav {
      opacity: 0;
      transform: translateY(12px);
    }

    .slide.active .slide__eyebrow { animation: up 0.6s var(--ease) 0.28s  forwards; }
    .slide.active .slide__title   { animation: up 0.7s var(--ease) 0.42s  forwards; }
    .slide.active .slide__rule    { animation: up 0.6s var(--ease) 0.56s  forwards; }
    .slide.active .slide__phrase  { animation: up 0.65s var(--ease) 0.63s forwards; }
    .slide.active .slide__nav     { animation: up 0.6s var(--ease) 0.78s  forwards; }

    @keyframes up { to { opacity:1; transform:translateY(0); } }

    /* ═══════════════════════
       RESPONSIVE
    ═══════════════════════ */
    @media (orientation: landscape) and (max-height: 500px) {
      .slide__story { padding: 1.1rem 2rem; gap: 0.35rem; }
      .slide__title { font-size: 1.5rem; }
      .slide__phrase { display: none; }
    }

    @media (min-width: 700px) {
      .slide__story {
        max-width: 500px;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        padding-bottom: 2.5rem;
      }
      .slide__story::before { display: none; }
    }
  </style>
</head>
<body>

  <div id="topBar"></div>
  <div id="slideBadge">01 / 09</div>
  <div id="slideshow"></div>

  <button id="musicBtn" aria-label="Música">
    <div class="music-bars">
      <span></span><span></span><span></span><span></span>
    </div>
  </button>

  <audio id="music1" loop><source src="song/primeiro-amor.mp3" type="audio/mpeg"></audio>
  <audio id="music2" loop><source src="song/primeiro-amor.mp3" type="audio/mpeg"></audio>

  <script>
    // ─────────────────────────────────────────────────
    //  SLIDES DATA
    //  bg:  string → single photo
    //       [a, b]  → crossfade between a (4s) → b
    //  video: path to mp4 (null = none)
    //  kb:  Ken Burns variant class
    //  grade: color overlay for cinematic grading
    // ─────────────────────────────────────────────────
    const IMG = 'image/';

    const slides = [
      // bg pode ser objeto { src, pos, rotate? } ou array de objetos
      // pos = background-position  |  rotate = graus CSS (90, -90, 180)
      {
        title:    "Minha princesa",
        phrase:   "Você é a razão do meu viver. Cada presente tem uma intenção. Por isso, siga um passo de cada vez.",
        video:    IMG + "MOVIE.mp4",
        bg:       { src: IMG + "20240131_180643.jpg", pos: 'center 28%' },
        btnLabel: "Começar",
        music:    null,
        kb:       "kb-zoom-in",
        grade:    "rgba(160,80,40,0.28)",
      },
      {
        title:    "Primeiro passo",
        phrase:   "Abra a tampa e volte aqui.",
        bg: [
          { src: IMG + "IMG_20211009_150628.jpg",    pos: 'center 38%' },
          { src: IMG + "IMG_20170422_214516591.jpg", pos: '38% 28%'    },
        ],
        btnLabel: "Próximo",
        music:    null,
        kb:       "kb-pan-right",
        grade:    "rgba(100,70,140,0.22)",
      },
      {
        title:    "Vestir e Usar",
        phrase:   "Confesso que esse é para nós dois. Louco pra você usar.",
        bg: [
          { src: IMG + "IMG_20220927_162831.jpg",    pos: '42% 22%'   },
          { src: IMG + "IMG_20170226_133235035.jpg", pos: 'center 18%' },
        ],
        btnLabel: "Próximo",
        music:    "music2",
        kb:       "kb-zoom-out",
        grade:    "rgba(190,130,50,0.2)",
      },
      {
        title:    "Ler",
        phrase:   "Cada palavra foi escrita pensando em você.",
        bg: [
          { src: IMG + "IMG_20161231_231900656.jpg", pos: 'center 22%' },
          { src: IMG + "IMG_20211011_194500.jpg",    rotate: 90        }, // foto deitada → corrigida
        ],
        btnLabel: "Próximo",
        music:    "music2",
        kb:       "kb-pan-left",
        grade:    "rgba(50,90,120,0.28)",
      },
      {
        title:    "Escrever",
        phrase:   "Deixe seus pensamentos fluírem. Este espaço é só seu.",
        bg: [
          { src: IMG + "IMG_20220312_174438.jpg",  pos: '42% 20%'   },
          { src: IMG + "IMG_20220312_155046.jpg",  pos: 'center 42%' },
        ],
        btnLabel: "Próximo",
        music:    "music1",
        kb:       "kb-diagonal",
        grade:    "rgba(160,120,80,0.2)",
      },
      {
        title:    "Ser Usada",
        phrase:   "Este presente foi feito para estar com você todos os dias.",
        bg: [
          { src: IMG + "IMG_20210103_175730.jpg", pos: 'center 30%' },
          { src: IMG + "20240131_180643.jpg",     pos: 'center 28%' },
        ],
        btnLabel: "Próximo",
        music:    "music1",
        kb:       "kb-zoom-in",
        grade:    "rgba(170,80,80,0.22)",
      },
      {
        title:    "Relaxar",
        phrase:   "Você merece parar, respirar e simplesmente ser.",
        bg: [
          { src: IMG + "IMG_20220928_132802.jpg",  rotate: 180  }, // foto de cabeça pra baixo → corrigida
          { src: IMG + "IMG_20220927_134325.jpg",  rotate: -90  }, // foto deitada → corrigida
        ],
        btnLabel: "Próximo",
        music:    "music1",
        kb:       "kb-pan-right",
        grade:    "rgba(50,110,100,0.28)",
      },
      {
        title:    "Organizar & Executar",
        phrase:   "Com tudo no lugar, seus sonhos ficam mais perto.",
        bg:       { src: IMG + "IMG_20170121_220459464_BURST000_COVER_TOP.jpg", pos: 'center 30%' },
        btnLabel: "Próximo",
        music:    "music1",
        kb:       "kb-zoom-out",
        grade:    "rgba(130,150,70,0.2)",
      },
      {
        title:    "Com amor ♡",
        phrase:   "O cartão está na tampa. Ele diz tudo o que o coração não coube em palavras.",
        bg:       { src: IMG + "20240131_180643.jpg", pos: 'center 28%' },
        btnLabel: null,
        music:    null,
        kb:       "kb-zoom-in",
        grade:    "rgba(160,80,40,0.28)",
      },
    ];

    // ─────────────────────────────────────────────────
    //  STATE
    // ─────────────────────────────────────────────────
    let current = 0;
    let muted   = false;
    const audios     = { music1: document.getElementById('music1'), music2: document.getElementById('music2') };
    const musicBtn   = document.getElementById('musicBtn');
    const slideBadge = document.getElementById('slideBadge');
    const topBarEl   = document.getElementById('topBar');
    const slideshow  = document.getElementById('slideshow');

    // ─────────────────────────────────────────────────
    //  BUILD TOP BAR
    // ─────────────────────────────────────────────────
    slides.forEach(() => {
      const seg  = document.createElement('div');
      seg.className = 'bar-segment';
      const fill = document.createElement('div');
      fill.className = 'bar-fill';
      seg.appendChild(fill);
      topBarEl.appendChild(seg);
    });

    // ─────────────────────────────────────────────────
    //  BUILD SLIDES
    // ─────────────────────────────────────────────────
    slides.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'slide' + (i === 0 ? ' active' : '');

      // ── Video background (if provided) ──
      if (s.video) {
        const vWrap = document.createElement('div');
        vWrap.className = 'slide__video';
        const vid = document.createElement('video');
        vid.src = s.video;
        vid.autoplay = true;
        vid.muted    = true;
        vid.loop     = true;
        vid.playsInline = true;
        vid.setAttribute('playsinline', '');
        vWrap.appendChild(vid);
        el.appendChild(vWrap);
      }

      // ── Helper: build photo element ──
      // imgObj: { src, pos?, rotate? }
      // kbClass: Ken Burns class (only for photo A)
      // isB: true = crossfade (slide__photo-b), false = photo A
      function makePhoto(imgObj, kbClass, isB) {
        const wrap = document.createElement('div');
        wrap.className = isB ? 'slide__photo slide__photo-b' : `slide__photo ${kbClass}`;

        if (imgObj.rotate !== undefined) {
          // Rotated image: <img> element with CSS transform
          wrap.style.overflow = 'hidden';
          const img = document.createElement('img');
          img.src = imgObj.src;
          img.draggable = false;
          const is90 = Math.abs(imgObj.rotate) === 90;
          img.style.cssText = `
            position:absolute; top:50%; left:50%;
            ${is90 ? 'width:100vh; height:100vw;' : 'width:100%; height:100%;'}
            object-fit:cover; object-position:center;
            transform:translate(-50%,-50%) rotate(${imgObj.rotate}deg);
            pointer-events:none;
          `;
          wrap.appendChild(img);
        } else {
          wrap.style.backgroundImage  = `url('${imgObj.src}')`;
          wrap.style.backgroundPosition = imgObj.pos || 'center center';
        }
        return wrap;
      }

      // ── Photo A (always present) ──
      const imgA  = Array.isArray(s.bg) ? s.bg[0] : s.bg;
      const photoA = makePhoto(imgA, s.kb, false);
      if (s.video) photoA.style.opacity = '0';
      el.appendChild(photoA);

      // ── Photo B (crossfade, if 2 images) ──
      if (Array.isArray(s.bg) && s.bg[1]) {
        el.appendChild(makePhoto(s.bg[1], s.kb, true));
      }

      // ── Color grade ──
      const grade = document.createElement('div');
      grade.className = 'slide__grade';
      grade.style.background = s.grade;
      el.appendChild(grade);

      // ── Vignette ──
      const vig = document.createElement('div');
      vig.className = 'slide__vignette';
      el.appendChild(vig);

      // ── Bokeh ──
      const bokeh = document.createElement('div');
      bokeh.className = 'bokeh';
      for (let p = 0; p < 5; p++) {
        const dot = document.createElement('div');
        dot.className = 'bokeh__dot';
        const sz = 7 + Math.random() * 14;
        dot.style.cssText = `
          width:${sz}px;height:${sz}px;
          left:${Math.random()*100}%;
          bottom:${Math.random()*18}%;
          animation-duration:${10+Math.random()*12}s;
          animation-delay:${Math.random()*9}s;
        `;
        bokeh.appendChild(dot);
      }
      el.appendChild(bokeh);

      // ── Story panel ──
      const story = document.createElement('div');
      story.className = 'slide__story';

      const eyebrow = document.createElement('div');
      eyebrow.className = 'slide__eyebrow';
      eyebrow.textContent = `${String(i+1).padStart(2,'0')} — ${String(slides.length).padStart(2,'0')}`;

      const title = document.createElement('h1');
      title.className = 'slide__title';
      title.textContent = s.title;

      const rule = document.createElement('div');
      rule.className = 'slide__rule';
      rule.innerHTML = '<div class="slide__rule-dot"></div><div class="slide__rule-line"></div>';

      story.appendChild(eyebrow);
      story.appendChild(title);
      story.appendChild(rule);

      if (s.phrase) {
        const phrase = document.createElement('p');
        phrase.className = 'slide__phrase';
        phrase.textContent = s.phrase;
        story.appendChild(phrase);
      }

      const nav = document.createElement('div');
      nav.className = 'slide__nav';

      if (i > 0) {
        const back = document.createElement('button');
        back.className = 'btn btn-back';
        back.textContent = '← Voltar';
        back.addEventListener('click', () => goTo(current - 1));
        nav.appendChild(back);
      }

      if (s.btnLabel) {
        const next = document.createElement('button');
        next.className = 'btn btn-next';
        next.textContent = s.btnLabel + ' →';
        next.addEventListener('click', () => goTo(current + 1));
        nav.appendChild(next);
      }

      story.appendChild(nav);
      el.appendChild(story);
      slideshow.appendChild(el);
    });

    // ─────────────────────────────────────────────────
    //  GYROSCOPE PARALLAX
    // ─────────────────────────────────────────────────
    let gyroOk = false;
    window.addEventListener('deviceorientation', (e) => {
      if (!gyroOk && e.gamma !== null) gyroOk = true;
      if (!gyroOk) return;
      const tx = Math.max(-8, Math.min(8, e.gamma || 0));
      const ty = Math.max(-4, Math.min(4, (e.beta || 0) - 45));
      const photo = document.querySelectorAll('.slide')[current]?.querySelector('.slide__photo');
      if (photo) photo.style.transform = `translate(${tx * 0.35}px, ${ty * 0.28}px)`;
    }, { passive: true });

    // ─────────────────────────────────────────────────
    //  UI UPDATE
    // ─────────────────────────────────────────────────
    function updateUI(index) {
      slideBadge.textContent =
        `${String(index+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}`;

      document.querySelectorAll('.bar-segment').forEach((seg, i) => {
        const fill = seg.querySelector('.bar-fill');
        seg.classList.remove('done','active');

        if (i < index) {
          seg.classList.add('done');
          fill.style.transition = 'none';
          fill.style.width = '100%';
        } else if (i === index) {
          fill.style.transition = 'none';
          fill.style.width = '0%';
          requestAnimationFrame(() => requestAnimationFrame(() => {
            fill.style.transition = 'width 8s linear';
            fill.style.width = '100%';
          }));
        } else {
          fill.style.transition = 'none';
          fill.style.width = '0%';
        }
      });
    }

    // ─────────────────────────────────────────────────
    //  MUSIC — fade in / fade out
    // ─────────────────────────────────────────────────
    const FADE_IN_MS  = 1800;
    const FADE_OUT_MS = 1200;
    let fadeInterval  = null;

    function clearFade() {
      if (fadeInterval) { clearInterval(fadeInterval); fadeInterval = null; }
    }

    function fadeIn(audio) {
      clearFade();
      audio.volume = 0;
      audio.play().catch(() => {});
      const step   = 1 / (FADE_IN_MS / 50);
      fadeInterval = setInterval(() => {
        audio.volume = Math.min(1, audio.volume + step);
        if (audio.volume >= 1) clearFade();
      }, 50);
    }

    function fadeOut(audio, callback) {
      clearFade();
      if (audio.paused) { callback && callback(); return; }
      const step   = audio.volume / (FADE_OUT_MS / 50);
      fadeInterval = setInterval(() => {
        audio.volume = Math.max(0, audio.volume - step);
        if (audio.volume <= 0) {
          clearFade();
          audio.pause();
          audio.currentTime = 0;
          callback && callback();
        }
      }, 50);
    }

    function applyMusic(track) {
      const prev = Object.values(audios).find(a => !a.paused);
      const next = track && audios[track];

      if (prev && prev !== next) {
        // fade out previous, then fade in next
        fadeOut(prev, () => {
          if (!muted && next && next.src) fadeIn(next);
        });
      } else if (!prev && next) {
        if (!muted && next.src) fadeIn(next);
      }

      if (next) {
        musicBtn.classList.add('visible');
        if (!muted) musicBtn.classList.add('playing');
        else musicBtn.classList.remove('playing');
      } else {
        musicBtn.classList.remove('visible','playing');
      }
    }

    musicBtn.addEventListener('click', () => {
      const track = slides[current].music;
      if (!track) return;
      muted = !muted;
      const audio = audios[track];
      if (muted) {
        fadeOut(audio, () => musicBtn.classList.remove('playing'));
      } else {
        fadeIn(audio);
        musicBtn.classList.add('playing');
      }
    });

    // ─────────────────────────────────────────────────
    //  NAVIGATE
    // ─────────────────────────────────────────────────
    function goTo(index) {
      if (index < 0 || index >= slides.length) return;

      // Restart Ken Burns on target slide
      const targetEl = document.querySelectorAll('.slide')[index];
      const photo    = targetEl.querySelector('.slide__photo');
      const kb       = slides[index].kb;
      photo.classList.remove('kb-zoom-in','kb-zoom-out','kb-pan-right','kb-pan-left','kb-diagonal');
      void photo.offsetWidth;
      photo.classList.add(kb);

      // Restart crossfade photo-b
      const photoB = targetEl.querySelector('.slide__photo-b');
      if (photoB) {
        photoB.style.animation = 'none';
        void photoB.offsetWidth;
        photoB.style.animation = '';
      }

      // Play video if present
      const vid = targetEl.querySelector('video');
      if (vid) vid.play().catch(() => {});

      document.querySelectorAll('.slide')[current].classList.remove('active');
      current = index;
      document.querySelectorAll('.slide')[current].classList.add('active');
      updateUI(current);
      applyMusic(slides[current].music);
    }

    // Init
    updateUI(0);
    // Start video on slide 1 if present
    const firstVid = document.querySelector('.slide.active video');
    if (firstVid) firstVid.play().catch(() => {});

    // Autoplay music on first user interaction (browser policy requires it)
    let musicStarted = false;
    function startMusicOnce() {
      if (musicStarted) return;
      musicStarted = true;
      const track = slides[current].music;
      if (track && !muted) {
        fadeIn(audios[track]);
        musicBtn.classList.add('playing');
      }
    }
    document.addEventListener('click',      startMusicOnce, { once: true });
    document.addEventListener('touchstart', startMusicOnce, { once: true, passive: true });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(current+1); }
      if (e.key === 'ArrowLeft')                   { e.preventDefault(); goTo(current-1); }
    });

    // Touch swipe
    let tx = 0, ty = 0;
    document.addEventListener('touchstart', e => {
      tx = e.touches[0].clientX;
      ty = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tx;
      const dy = e.changedTouches[0].clientY - ty;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 42) {
        goTo(dx < 0 ? current+1 : current-1);
      }
    }, { passive: true });
  </script>
</body>
</html>
