<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cartão Virtual 💌</title>
  <meta name="robots" content="noindex" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💌</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:     #f8eedd;
      --gold:      #c99b3f;
      --gold-l:    #e6bf72;
      --dark:      #0a0705;
      --ease:      cubic-bezier(0.42, 0, 0.18, 1);
      --font-s:    'Playfair Display', Georgia, serif;
      --font-b:    'Josefin Sans', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ═══════════════════════
       TOP PROGRESS BAR
    ═══════════════════════ */
    #topBar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      z-index: 200;
      display: flex;
      gap: 3px;
      padding: env(safe-area-inset-top, 0) 12px 0;
      align-items: center;
      height: calc(6px + env(safe-area-inset-top, 0));
    }

    .bar-segment {
      flex: 1;
      height: 2px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .bar-segment .bar-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--gold-l));
      border-radius: 2px;
      transition: width 0.5s var(--ease);
    }

    .bar-segment.done .bar-fill  { width: 100%; }
    .bar-segment.active .bar-fill { width: 100%; transition: width 8s linear; }

    /* ═══════════════════════
       SLIDESHOW
    ═══════════════════════ */
    #slideshow {
      position: fixed;
      inset: 0;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.65s var(--ease);
    }

    .slide.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Photo layer ── */
    .slide__photo {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center top;
      will-change: transform;
    }

    /* Ken Burns variants — assigned per slide */
    .kb-zoom-in    { animation: kbZoomIn  9s ease forwards; }
    .kb-zoom-out   { animation: kbZoomOut 9s ease forwards; }
    .kb-pan-right  { animation: kbPanR    9s ease forwards; }
    .kb-pan-left   { animation: kbPanL    9s ease forwards; }
    .kb-diagonal   { animation: kbDiag    9s ease forwards; }

    @keyframes kbZoomIn  { from { transform: scale(1.08) translate(0,0);    } to { transform: scale(1)    translate(0,0);    } }
    @keyframes kbZoomOut { from { transform: scale(1)    translate(0,0);    } to { transform: scale(1.07) translate(0,0);    } }
    @keyframes kbPanR    { from { transform: scale(1.06) translate(-2%,0);  } to { transform: scale(1.02) translate(2%,0);   } }
    @keyframes kbPanL    { from { transform: scale(1.06) translate(2%,0);   } to { transform: scale(1.02) translate(-2%,0);  } }
    @keyframes kbDiag    { from { transform: scale(1.07) translate(-1%,1%); } to { transform: scale(1.01) translate(1%,-1%); } }

    /* ── Color grading overlay ── */
    .slide__grade {
      position: absolute;
      inset: 0;
      mix-blend-mode: multiply;
      opacity: 0.45;
    }

    /* ── Vignette ── */
    .slide__vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 75% at 50% 38%, transparent 25%, rgba(5,2,0,0.68) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, transparent 30%, transparent 50%, rgba(0,0,0,0.75) 100%);
    }

    /* ── Bokeh ── */
    .bokeh {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bokeh__dot {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(230,191,114,0.6) 0%, transparent 65%);
      filter: blur(3px);
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0)    scale(1);   opacity: 0; }
      8%   { opacity: 0.8; }
      85%  { opacity: 0.5; }
      100% { transform: translateY(-105vh) scale(1.4); opacity: 0; }
    }

    /* ═══════════════════════
       STORY-STYLE CONTENT
       Panel docked at bottom
    ═══════════════════════ */
    .slide__story {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      padding: 2rem 1.75rem;
      padding-bottom: max(2rem, env(safe-area-inset-bottom, 2rem));
      background: linear-gradient(to top,
        rgba(6,3,1,0.88) 0%,
        rgba(6,3,1,0.72) 40%,
        rgba(6,3,1,0.3)  75%,
        transparent 100%
      );
      backdrop-filter: blur(0px);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    /* Subtle left accent bar */
    .slide__story::before {
      content: '';
      position: absolute;
      left: 0; top: 30%; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      opacity: 0.5;
    }

    .slide__eyebrow {
      font-family: var(--font-b);
      font-size: 0.58rem;
      font-weight: 200;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.85;
    }

    .slide__title {
      font-family: var(--font-s);
      font-size: clamp(1.9rem, 7.5vw, 2.8rem);
      font-weight: 700;
      font-style: italic;
      line-height: 1.1;
      color: var(--cream);
      text-shadow: 0 2px 20px rgba(0,0,0,0.5);
      letter-spacing: -0.01em;
    }

    .slide__rule {
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }

    .slide__rule-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.7;
    }

    .slide__rule-line {
      height: 1px;
      width: 2rem;
      background: linear-gradient(90deg, var(--gold), transparent);
      opacity: 0.6;
    }

    .slide__phrase {
      font-family: var(--font-s);
      font-size: clamp(0.9rem, 3.8vw, 1.05rem);
      font-weight: 400;
      line-height: 1.7;
      color: rgba(248,238,221,0.8);
      text-shadow: 0 1px 10px rgba(0,0,0,0.6);
      max-width: 38ch;
    }

    /* ── Nav ── */
    .slide__nav {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-top: 0.6rem;
      flex-wrap: wrap;
    }

    .btn {
      cursor: pointer;
      border: none;
      outline: none;
      font-family: var(--font-b);
      font-size: 0.62rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.9rem 1.75rem;
      transition: all 0.25s ease;
      -webkit-tap-highlight-color: transparent;
      min-height: 44px; /* accessibility touch target */
    }

    .btn-next {
      background: var(--gold);
      color: var(--dark);
      position: relative;
      overflow: hidden;
      flex: 1;
      max-width: 200px;
    }

    .btn-next::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 55%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
      transition: left 0.55s ease;
    }

    .btn-next:hover::after,
    .btn-next:active::after { left: 160%; }

    .btn-next:active { transform: scale(0.97); }

    .btn-back {
      background: rgba(255,255,255,0.07);
      color: rgba(248,238,221,0.6);
      border: 1px solid rgba(255,255,255,0.14);
      min-width: 80px;
    }

    .btn-back:active { opacity: 0.7; transform: scale(0.97); }

    /* ═══════════════════════
       PROGRESS DOTS
    ═══════════════════════ */
    /* (replaced by top segments; keeping a counter badge) */
    #slideBadge {
      position: fixed;
      top: max(1rem, calc(env(safe-area-inset-top, 0) + 0.6rem));
      right: 1rem;
      font-family: var(--font-b);
      font-size: 0.58rem;
      font-weight: 200;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.55);
      z-index: 201;
    }

    /* ═══════════════════════
       MUSIC BUTTON
    ═══════════════════════ */
    #musicBtn {
      position: fixed;
      bottom: max(1rem, env(safe-area-inset-bottom, 1rem));
      right: 1rem;
      z-index: 100;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(201,155,63,0.35);
      backdrop-filter: blur(8px);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      outline: none;
    }

    #musicBtn.visible { opacity: 1; pointer-events: all; }

    .music-bars {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 11px;
    }

    .music-bars span {
      display: block;
      width: 2px;
      border-radius: 1px;
      background: var(--gold);
      transform-origin: bottom;
    }

    #musicBtn.playing .music-bars span {
      animation: mBar 0.75s ease-in-out infinite alternate;
    }

    #musicBtn.playing .music-bars span:nth-child(1) { height: 4px;  animation-delay: 0s;    }
    #musicBtn.playing .music-bars span:nth-child(2) { height: 10px; animation-delay: 0.2s;  }
    #musicBtn.playing .music-bars span:nth-child(3) { height: 6px;  animation-delay: 0.35s; }
    #musicBtn.playing .music-bars span:nth-child(4) { height: 11px; animation-delay: 0.1s;  }

    #musicBtn:not(.playing) .music-bars span { height: 4px !important; opacity: 0.4; }

    @keyframes mBar {
      from { transform: scaleY(0.2); }
      to   { transform: scaleY(1); }
    }

    /* ═══════════════════════
       CONTENT ANIMATIONS
    ═══════════════════════ */
    .slide__eyebrow,
    .slide__title,
    .slide__rule,
    .slide__phrase,
    .slide__nav {
      opacity: 0;
      transform: translateY(12px);
    }

    .slide.active .slide__eyebrow { animation: up 0.6s var(--ease) 0.3s  forwards; }
    .slide.active .slide__title   { animation: up 0.7s var(--ease) 0.42s forwards; }
    .slide.active .slide__rule    { animation: up 0.6s var(--ease) 0.55s forwards; }
    .slide.active .slide__phrase  { animation: up 0.65s var(--ease) 0.62s forwards; }
    .slide.active .slide__nav     { animation: up 0.6s var(--ease) 0.78s forwards; }

    @keyframes up {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════
       RESPONSIVE — LANDSCAPE
    ═══════════════════════ */
    @media (orientation: landscape) and (max-height: 500px) {
      .slide__story { padding: 1.25rem 2rem; gap: 0.4rem; }
      .slide__title { font-size: 1.6rem; }
      .slide__phrase { display: none; }
    }

    /* Large screens — center the panel */
    @media (min-width: 700px) {
      .slide__story {
        max-width: 520px;
        margin: 0 auto;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
        border-radius: 0;
        padding-bottom: 2.5rem;
      }

      .slide__story::before { display: none; }
    }
  </style>
</head>
<body>

  <div id="topBar"></div>
  <div id="slideBadge">01 / 09</div>
  <div id="slideshow"></div>
  <button id="musicBtn" aria-label="Música">
    <div class="music-bars">
      <span></span><span></span><span></span><span></span>
    </div>
  </button>

  <audio id="music1" loop><!-- <source src="../audio/musica1.mp3" type="audio/mpeg"> --></audio>
  <audio id="music2" loop><!-- <source src="../audio/musica2.mp3" type="audio/mpeg"> --></audio>

  <script>
    // ─────────────────────────────────────────
    //  SLIDES DATA
    //  kb: Ken Burns variant (zoom-in, zoom-out, pan-right, pan-left, diagonal)
    //  grade: CSS color for the color grading overlay
    // ─────────────────────────────────────────
    const slides = [
      {
        title:    "Minha princesa",
        phrase:   "Você é a razão do meu viver. Cada presente tem uma intenção. Por isso, siga um passo de cada vez.",
        bg:       "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?w=1400&q=85",
        btnLabel: "Começar",
        music:    null,
        kb:       "kb-zoom-in",
        grade:    "rgba(180,100,60,0.3)",
      },
      {
        title:    "Primeiro passo",
        phrase:   "Abra a tampa e volte aqui.",
        bg:       "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=1400&q=85",
        btnLabel: "Próximo",
        music:    null,
        kb:       "kb-pan-right",
        grade:    "rgba(120,80,160,0.25)",
      },
      {
        title:    "Vestir e Usar",
        phrase:   "Coloque, sinta e use com todo o amor que foi escolhido para você.",
        bg:       "https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=1400&q=85",
        btnLabel: "Próximo",
        music:    "music2",
        kb:       "kb-zoom-out",
        grade:    "rgba(200,140,60,0.2)",
      },
      {
        title:    "Ler",
        phrase:   "Cada palavra foi escrita pensando em você.",
        bg:       "https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=1400&q=85",
        btnLabel: "Próximo",
        music:    "music2",
        kb:       "kb-pan-left",
        grade:    "rgba(60,100,130,0.3)",
      },
      {
        title:    "Escrever",
        phrase:   "Deixe seus pensamentos fluírem. Este espaço é só seu.",
        bg:       "https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?w=1400&q=85",
        btnLabel: "Próximo",
        music:    "music1",
        kb:       "kb-diagonal",
        grade:    "rgba(170,130,90,0.2)",
      },
      {
        title:    "Ser Usada",
        phrase:   "Este presente foi feito para estar com você todos os dias.",
        bg:       "https://images.unsplash.com/photo-1513185158878-8d8c2a2a3da3?w=1400&q=85",
        btnLabel: "Próximo",
        music:    "music1",
        kb:       "kb-zoom-in",
        grade:    "rgba(180,90,90,0.25)",
      },
      {
        title:    "Relaxar",
        phrase:   "Você merece parar, respirar e simplesmente ser.",
        bg:       "https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=1400&q=85",
        btnLabel: "Próximo",
        music:    "music1",
        kb:       "kb-pan-right",
        grade:    "rgba(60,120,110,0.3)",
      },
      {
        title:    "Organizar & Executar",
        phrase:   "Com tudo no lugar, seus sonhos ficam mais perto.",
        bg:       "https://images.unsplash.com/photo-1484480974693-6ca0a78fb36b?w=1400&q=85",
        btnLabel: "Próximo",
        music:    "music1",
        kb:       "kb-zoom-out",
        grade:    "rgba(140,160,80,0.2)",
      },
      {
        title:    "Com amor",
        phrase:   "O cartão está na tampa. Ele diz tudo o que o coração não coube em palavras.",
        bg:       "https://images.unsplash.com/photo-1518621736915-f3b1c41bfd00?w=1400&q=85",
        btnLabel: null,
        music:    null,
        kb:       "kb-zoom-in",
        grade:    "rgba(180,100,60,0.3)",
      },
    ];

    // ─────────────────────────────────────────
    //  STATE
    // ─────────────────────────────────────────
    let current = 0;
    let muted   = false;
    const audios = { music1: document.getElementById('music1'), music2: document.getElementById('music2') };
    const musicBtn  = document.getElementById('musicBtn');
    const slideBadge = document.getElementById('slideBadge');

    // ─────────────────────────────────────────
    //  BUILD TOP BAR SEGMENTS
    // ─────────────────────────────────────────
    const topBarEl = document.getElementById('topBar');
    slides.forEach((_, i) => {
      const seg = document.createElement('div');
      seg.className = 'bar-segment';
      const fill = document.createElement('div');
      fill.className = 'bar-fill';
      seg.appendChild(fill);
      topBarEl.appendChild(seg);
    });

    // ─────────────────────────────────────────
    //  BUILD SLIDES
    // ─────────────────────────────────────────
    const slideshow = document.getElementById('slideshow');

    slides.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'slide' + (i === 0 ? ' active' : '');

      // Photo
      const photo = document.createElement('div');
      photo.className = `slide__photo ${s.kb}`;
      photo.style.backgroundImage = `url('${s.bg}')`;
      el.appendChild(photo);

      // Color grade
      const grade = document.createElement('div');
      grade.className = 'slide__grade';
      grade.style.background = s.grade;
      el.appendChild(grade);

      // Vignette
      const vig = document.createElement('div');
      vig.className = 'slide__vignette';
      el.appendChild(vig);

      // Bokeh
      const bokeh = document.createElement('div');
      bokeh.className = 'bokeh';
      for (let p = 0; p < 6; p++) {
        const dot = document.createElement('div');
        dot.className = 'bokeh__dot';
        const sz = 8 + Math.random() * 16;
        dot.style.cssText = `
          width:${sz}px;height:${sz}px;
          left:${Math.random()*100}%;
          bottom:${Math.random()*20}%;
          animation-duration:${10+Math.random()*12}s;
          animation-delay:${Math.random()*8}s;
        `;
        bokeh.appendChild(dot);
      }
      el.appendChild(bokeh);

      // Story panel
      const story = document.createElement('div');
      story.className = 'slide__story';

      const eyebrow = document.createElement('div');
      eyebrow.className = 'slide__eyebrow';
      eyebrow.textContent = `${String(i+1).padStart(2,'0')} — ${String(slides.length).padStart(2,'0')}`;

      const title = document.createElement('h1');
      title.className = 'slide__title';
      title.textContent = s.title;

      const rule = document.createElement('div');
      rule.className = 'slide__rule';
      rule.innerHTML = `<div class="slide__rule-dot"></div><div class="slide__rule-line"></div>`;

      story.appendChild(eyebrow);
      story.appendChild(title);
      story.appendChild(rule);

      if (s.phrase) {
        const phrase = document.createElement('p');
        phrase.className = 'slide__phrase';
        phrase.textContent = s.phrase;
        story.appendChild(phrase);
      }

      const nav = document.createElement('div');
      nav.className = 'slide__nav';

      if (i > 0) {
        const back = document.createElement('button');
        back.className = 'btn btn-back';
        back.textContent = '← Voltar';
        back.addEventListener('click', () => goTo(current - 1));
        nav.appendChild(back);
      }

      if (s.btnLabel) {
        const next = document.createElement('button');
        next.className = 'btn btn-next';
        next.textContent = s.btnLabel + ' →';
        next.addEventListener('click', () => goTo(current + 1));
        nav.appendChild(next);
      }

      story.appendChild(nav);
      el.appendChild(story);
      slideshow.appendChild(el);
    });

    // ─────────────────────────────────────────
    //  PARALLAX (gyroscope — mobile)
    // ─────────────────────────────────────────
    let gyroSupported = false;
    if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', (e) => {
        if (!gyroSupported && e.gamma !== null) gyroSupported = true;
        if (!gyroSupported) return;
        const tiltX = Math.max(-8, Math.min(8, e.gamma || 0));
        const tiltY = Math.max(-4, Math.min(4, (e.beta  || 0) - 45));
        const photo = document.querySelectorAll('.slide')[current]?.querySelector('.slide__photo');
        if (photo) {
          photo.style.transform = `translate(${tiltX * 0.4}px, ${tiltY * 0.3}px)`;
        }
      }, { passive: true });
    }

    // ─────────────────────────────────────────
    //  NAVIGATION
    // ─────────────────────────────────────────
    function updateUI(index) {
      // Badge
      slideBadge.textContent = `${String(index+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}`;

      // Top bar segments
      document.querySelectorAll('.bar-segment').forEach((seg, i) => {
        seg.classList.remove('done','active');
        if (i < index) seg.classList.add('done');
        if (i === index) seg.classList.add('active');
        // reset fill animation
        const fill = seg.querySelector('.bar-fill');
        fill.style.transition = 'none';
        fill.style.width = (i < index ? '100%' : '0%');
        if (i === index) {
          requestAnimationFrame(() => {
            fill.style.transition = 'width 8s linear';
            fill.style.width = '100%';
          });
        }
      });
    }

    function applyMusic(track) {
      Object.values(audios).forEach(a => { a.pause(); a.currentTime = 0; });
      if (track && audios[track]) {
        musicBtn.classList.add('visible');
        if (!muted && audios[track].src) {
          audios[track].play().catch(() => {});
          musicBtn.classList.add('playing');
        } else {
          musicBtn.classList.remove('playing');
        }
      } else {
        musicBtn.classList.remove('visible','playing');
      }
    }

    function goTo(index) {
      if (index < 0 || index >= slides.length) return;

      // Restart Ken Burns on entering slide
      const nextSlideEl = document.querySelectorAll('.slide')[index];
      const nextPhoto = nextSlideEl.querySelector('.slide__photo');
      const kb = slides[index].kb;
      nextPhoto.classList.remove('kb-zoom-in','kb-zoom-out','kb-pan-right','kb-pan-left','kb-diagonal');
      void nextPhoto.offsetWidth; // reflow
      nextPhoto.classList.add(kb);

      document.querySelectorAll('.slide')[current].classList.remove('active');
      current = index;
      document.querySelectorAll('.slide')[current].classList.add('active');
      updateUI(current);
      applyMusic(slides[current].music);
    }

    // Init
    updateUI(0);

    // Music mute toggle
    musicBtn.addEventListener('click', () => {
      const track = slides[current].music;
      if (!track) return;
      muted = !muted;
      if (muted) {
        audios[track]?.pause();
        musicBtn.classList.remove('playing');
      } else {
        audios[track]?.play().catch(() => {});
        musicBtn.classList.add('playing');
      }
    });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(current+1); }
      if (e.key === 'ArrowLeft')                   { e.preventDefault(); goTo(current-1); }
    });

    // Touch swipe
    let tx = 0, ty = 0, dragging = false;
    document.addEventListener('touchstart', e => {
      tx = e.touches[0].clientX;
      ty = e.touches[0].clientY;
      dragging = true;
    }, { passive: true });
    document.addEventListener('touchend', e => {
      if (!dragging) return;
      dragging = false;
      const dx = e.changedTouches[0].clientX - tx;
      const dy = e.changedTouches[0].clientY - ty;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 42) {
        goTo(dx < 0 ? current+1 : current-1);
      }
    }, { passive: true });
  </script>
</body>
</html>
